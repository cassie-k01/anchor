<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANCHOR — Post</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

<div class="navbar">
    <a href="feed.html" class="navbar-brand">
        <div class="navbar-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM12 6C13.1 6 14 6.9 14 8C14 9.1 13.1 10 12 10C10.9 10 10 9.1 10 8C10 6.9 10.9 6 12 6ZM16 14H8C8 12.35 9.79 11 12 11C14.21 11 16 12.35 16 14Z"/>
            </svg>
        </div>
        <h1>ANCHOR</h1>
    </a>
    <div class="navbar-links">
        <a href="feed.html">Feed</a>
        <a href="resources.html">Resources</a>
        <a href="create-post.html" class="btn-nav-post">+ New Post</a>
        <a href="#" id="admin-link" class="hidden">Admin</a>
        <a href="#" class="logout-link" onclick="logout()">Logout</a>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode"></button>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </div>
</div>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobile-menu">
    <a href="feed.html">Feed</a>
    <a href="resources.html">Resources</a>
    <a href="create-post.html">+ New Post</a>
    <a href="#" id="admin-link-mobile" class="hidden">Admin</a>
    <a href="#" onclick="logout()">Logout</a>
    <div class="theme-row">
        Dark Mode
        <button class="theme-toggle" onclick="toggleTheme()"></button>
    </div>
</div>

<div class="container">
    <div id="post-container">
        <div class="empty-state">
            <div class="empty-icon">⏳</div>
            <p>Loading post...</p>
        </div>
    </div>

    <div id="comments-section" class="hidden">
        <h3 class="comments-header">Responses & Advice</h3>

        <div class="card comment-form">
            <div id="comment-message"></div>
            <div class="form-group">
                <textarea id="comment-body" rows="3" 
                    placeholder="Share your advice or perspective..."></textarea>
            </div>
            <div class="comment-form-footer">
                <div class="checkbox-row">
                    <input type="checkbox" id="comment-anonymous" checked>
                    <label for="comment-anonymous">Reply anonymously 🎭</label>
                </div>
                <button class="btn btn-secondary" onclick="addComment()">Reply</button>
            </div>
        </div>

        <div id="comments-container"></div>
    </div>
</div>

<script src="/frontend/js/api.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="/frontend/js/navbar.js"></script>

</body>
</html>
